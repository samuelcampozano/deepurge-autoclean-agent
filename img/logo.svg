<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a2a4a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4DA2FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7B68EE;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="folderGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFA500;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="250" fill="url(#bgGrad)" stroke="url(#glowGrad)" stroke-width="4"/>
  
  <!-- Outer ring -->
  <circle cx="256" cy="256" r="230" fill="none" stroke="url(#glowGrad)" stroke-width="2" stroke-dasharray="12 6" opacity="0.4"/>
  
  <!-- Folder icon (main) -->
  <g transform="translate(256,220)" filter="url(#glow)">
    <!-- Folder back -->
    <rect x="-90" y="-40" width="180" height="120" rx="8" fill="url(#folderGrad)" opacity="0.9"/>
    <!-- Folder tab -->
    <path d="M-90,-40 L-90,-60 Q-90,-68 -82,-68 L-30,-68 L-15,-40" fill="url(#folderGrad)"/>
    <!-- Folder front -->
    <rect x="-90" y="-20" width="180" height="100" rx="6" fill="#FFE066" opacity="0.95"/>
    
    <!-- Sparkle/clean effect - broom -->
    <g transform="translate(0, 10)">
      <!-- Checkmark (organized) -->
      <path d="M-25,10 L-8,30 L30,-15" stroke="#0a1628" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>
  </g>
  
  <!-- Sui chain links (bottom arc) -->
  <g opacity="0.8" filter="url(#glow)">
    <!-- Chain link 1 -->
    <rect x="140" y="310" width="30" height="18" rx="9" fill="none" stroke="#4DA2FF" stroke-width="3"/>
    <!-- Chain link 2 -->
    <rect x="165" y="310" width="30" height="18" rx="9" fill="none" stroke="#4DA2FF" stroke-width="3"/>
    <!-- Chain link 3 -->
    <rect x="190" y="310" width="30" height="18" rx="9" fill="none" stroke="#4DA2FF" stroke-width="3"/>
    <!-- Arrow -->
    <path d="M225,319 L245,319" stroke="#4DA2FF" stroke-width="2" marker-end="url(#arrowhead)"/>
    <!-- Blockchain block -->
    <rect x="248" y="306" width="26" height="26" rx="4" fill="none" stroke="#7B68EE" stroke-width="3"/>
    <rect x="278" y="306" width="26" height="26" rx="4" fill="none" stroke="#7B68EE" stroke-width="3"/>
    <rect x="308" y="306" width="26" height="26" rx="4" fill="none" stroke="#7B68EE" stroke-width="3"/>
    <!-- Connection lines -->
    <line x1="274" y1="319" x2="278" y2="319" stroke="#7B68EE" stroke-width="2"/>
    <line x1="304" y1="319" x2="308" y2="319" stroke="#7B68EE" stroke-width="2"/>
  </g>
  
  <!-- Sparkle effects -->
  <g fill="#4DA2FF" opacity="0.7">
    <circle cx="380" cy="140" r="4"/>
    <circle cx="150" cy="130" r="3"/>
    <circle cx="370" cy="260" r="3"/>
    <circle cx="130" cy="270" r="4"/>
    <circle cx="340" cy="170" r="2.5"/>
  </g>
  
  <!-- Stars (clean sparkle) -->
  <g fill="#FFD700" opacity="0.8">
    <polygon points="390,180 393,188 401,188 395,193 397,201 390,196 383,201 385,193 379,188 387,188" />
    <polygon points="130,180 132,186 138,186 133,190 135,196 130,192 125,196 127,190 122,186 128,186" transform="scale(0.8) translate(30,30)"/>
  </g>
  
  <!-- DEEPURGE text -->
  <text x="256" y="400" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="800" font-size="52" fill="white" letter-spacing="6">DEEPURGE</text>
  
  <!-- Subtitle -->
  <text x="256" y="435" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="400" font-size="16" fill="#4DA2FF" letter-spacing="4">AUTOCLEAN AGENT</text>
  
  <!-- Powered by Sui badge -->
  <g transform="translate(256, 465)">
    <text x="0" y="0" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="300" font-size="12" fill="#888" letter-spacing="2">POWERED BY SUI × WALRUS</text>
  </g>
</svg>
